spring:
  application:
    name: xiaobai-workorder

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/workorder_db
    username: workorder_user
    password: workorder_pass
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

logging:
  level:
    root: INFO
    com.xiaobai.workorder: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/workorder.log
    max-size: 10MB
    max-history: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

app:
  jwt:
    secret: ${APP_JWT_SECRET:xiaobai-workorder-jwt-secret-key-change-in-production-2024}
    expiration: 86400000
    refresh-expiration: 604800000

  security:
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    max-age: 3600

  # MES Integration
  # Set enabled=true and configure base-url to activate outbound push and retry scheduler.
  mes:
    integration:
      enabled: false
      base-url: http://mes-system:8090
      api-key: ""
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
      retry-delay-ms: 300000
